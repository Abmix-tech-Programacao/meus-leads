<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABMIX | Painel de Leads</title>
  <meta name="description" content="Acesso restrito ao painel comercial ABMIX — gestão e distribuição de leads por vendedor e operadora." />
  <link rel="stylesheet" href="/assets/app.css" />
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-panel">

      <div class="brand-lockup">
        <img src="/brand/logo.png" alt="ABMIX" class="brand-logo hero-logo" />
        <div>
          <span class="eyebrow">ABMIX CORRETORA</span>
          <h1>Painel de Leads</h1>
        </div>
      </div>

      <p class="intro-copy">
        Ambiente interno para acompanhamento comercial, distribuição de carteira
        e gestão do andamento dos leads por vendedor e operadora.
      </p>

      <form id="loginForm" class="stack">
        <label>
          <span>E-mail</span>
          <input type="email" id="email" autocomplete="email" placeholder="seu@email.com" required />
        </label>
        <label>
          <span>Senha</span>
          <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required />
        </label>
        <button type="submit" id="loginSubmit">
          <span id="loginBtnText">Entrar no painel</span>
        </button>
        <p id="loginError" class="error-text"></p>
      </form>

      <div class="login-footer">
        <p>Uso restrito à equipe ABMIX &nbsp;·&nbsp; Acesso monitorado</p>
      </div>

    </section>
  </main>
  <script src="/assets/login.js"></script>
</body>
</html>
